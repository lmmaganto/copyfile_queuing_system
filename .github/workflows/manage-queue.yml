name: Manage Queue (slash commands)

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  handle-command:
    if: github.event.issue.state == 'open' && (startsWith(github.event.comment.body, '/checkout') || startsWith(github.event.comment.body, '/release') || startsWith(github.event.comment.body, '/approve'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify commenter is an authorized reviewer
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            // TODO: switch to team check after transfer to org.
            // Replace the block below with:
            //   const team = process.env.REVIEWER_TEAM;     // e.g. "sde-reviewers"
            //   const org  = context.repo.owner;
            //   const { data } = await github.rest.teams.getMembershipForUserInOrg({
            //     org, team_slug: team, username: commenter,
            //   });
            //   if (data.state !== 'active') throw new Error('not a team member');
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                username: commenter,
              });
            } catch (e) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number,
                body: `@${commenter} sorry — only authorized reviewers can run slash commands here.`,
              });
              core.setFailed('unauthorized');
              return;
            }
            core.setOutput('user', commenter);

      - name: Dispatch command
        if: success()
        uses: actions/github-script@v7
        env:
          COMMENTER: ${{ steps.auth.outputs.user }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const commenter = process.env.COMMENTER;
            const body = context.payload.comment.body.trim();
            const cmd  = body.split(/\s+/)[0];
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            const reply = (msg) => github.rest.issues.createComment({
              ...context.repo, issue_number: issue.number, body: msg,
            });
            const setLabels = async (toAdd, toRemove) => {
              for (const l of toRemove) {
                try { await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: issue.number, name: l,
                }); } catch (_) {}
              }
              if (toAdd.length) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number, labels: toAdd,
                });
              }
            };

            const updateIssuePathMarkers = async (oldPath, newPath) => {
              let newBody = issue.body || '';
              if ((issue.body || '').match(/<!--\s*folder:\s*(.+?)\s*-->/)) {
                newBody = newBody.replace(/<!--\s*folder:\s*.+?\s*-->/, `<!-- folder: ${newPath} -->`);
              }
              if ((issue.body || '').match(/<!--\s*path:\s*(.+?)\s*-->/)) {
                newBody = newBody.replace(/<!--\s*path:\s*.+?\s*-->/, `<!-- path: ${newPath} -->`);
              }
              if (newBody !== (issue.body || '')) {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: issue.number,
                  body: newBody,
                });
              }
            };

            const moveTrackedItemToStage = async (sourcePath, stageDir) => {
              const itemName = path.basename(sourcePath);
              const destPath = `reviews/${stageDir}/${itemName}`;
              if (sourcePath === destPath) return { moved: false, path: sourcePath };
              if (!sourcePath.startsWith('reviews/')) {
                throw new Error(`Tracked path is outside reviews/: ${sourcePath}`);
              }
              if (fs.existsSync(destPath)) {
                throw new Error(`Destination already exists: ${destPath}`);
              }
              fs.mkdirSync(`reviews/${stageDir}`, { recursive: true });
              execFileSync('git', ['config', 'user.name', 'github-actions[bot]']);
              execFileSync('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
              execFileSync('git', ['mv', sourcePath, destPath]);
              execFileSync('git', ['add', '-A']);
              const pending = execFileSync('git', ['status', '--short']).toString().trim();
              if (pending) {
                execFileSync('git', ['commit', '-m', `Queue move: ${itemName} -> reviews/${stageDir} (refs #${issue.number})`]);
                execFileSync('git', ['push']);
              }
              await updateIssuePathMarkers(sourcePath, destPath);
              return { moved: true, path: destPath };
            };

            // Extract the tracked review item from issue body markers.
            const folderMatch = (issue.body || '').match(/<!--\s*folder:\s*(.+?)\s*-->/);
            const folder = folderMatch ? folderMatch[1] : null;
            const pathMatch = (issue.body || '').match(/<!--\s*path:\s*(.+?)\s*-->/);
            const trackedPath = folder || (pathMatch ? pathMatch[1] : null);
            const hasTrackedPath = !!trackedPath && fs.existsSync(trackedPath);
            const trackedStat = hasTrackedPath ? fs.statSync(trackedPath) : null;
            const isFolderItem = !!trackedStat && trackedStat.isDirectory();
            const isFileItem = !!trackedStat && trackedStat.isFile();

            // Read reviewer_1 from metadata.yml if present.
            let reviewer1 = null;
            if (folder && fs.existsSync(path.join(folder, 'metadata.yml'))) {
              const yml = fs.readFileSync(path.join(folder, 'metadata.yml'), 'utf8');
              const m = yml.match(/^reviewer_1:\s*(.+?)\s*$/m);
              if (m && m[1] && m[1] !== 'null') reviewer1 = m[1];
            }

            const reviewerLine = reviewer1
              ? `The recorded first reviewer is @${reviewer1}.`
              : 'No first reviewer is recorded for this item, so the workflow cannot enforce reviewer separation automatically.';

            // ---------- /checkout ----------
            if (cmd === '/checkout') {
              if (labels.includes('awaiting-review-2')) {
                if (!trackedPath) {
                  await reply(`Could not determine which repository item this issue tracks (missing \`<!-- folder: ... -->\` or \`<!-- path: ... -->\` marker). Aborting checkout — contact the maintainer.`);
                  return;
                }
                if (!hasTrackedPath) {
                  await reply(`The tracked item for this issue was not found at \`${trackedPath}\`. Aborting checkout — contact the maintainer.`);
                  return;
                }
                if (reviewer1 && reviewer1 === commenter) {
                  await reply(`@${commenter} you were the **first reviewer** for this item — a different reviewer must perform the second review.`);
                  return;
                }
                await github.rest.issues.addAssignees({
                  ...context.repo, issue_number: issue.number, assignees: [commenter],
                });
                let activePath = trackedPath;
                try {
                  const moved = await moveTrackedItemToStage(trackedPath, 'in-progress');
                  activePath = moved.path;
                } catch (err) {
                  await reply(`Could not move the tracked item into \`reviews/in-progress/\`: ${err.message}`);
                  return;
                }
                await setLabels(['review-2-active'], ['awaiting-review-2', 'complete']); // Auto-copy curator notebook for R2
                if (isFolderItem) {
                  const metaPath = path.join(activePath, 'metadata.yml');
                  if (fs.existsSync(metaPath)) {
                      const meta = fs.readFileSync(metaPath, 'utf8');

                        // Read notebook name from metadata
                      const notebookMatch = meta.match(/^notebook:\s*(.+?)\s*$/m);
                      const notebookName = notebookMatch ? notebookMatch[1] : null;

                      // Update reviewer_2 in metadata
                      const updatedMeta = meta.replace(
                      /^reviewer_2:\s*.*$/m,
                      `reviewer_2: ${commenter}`
                    );
                    fs.writeFileSync(metaPath, updatedMeta);

                    if (notebookName) {
                        const r1Path = path.join(activePath, notebookName);
                        const r2Path = path.join(activePath, 'r2_notebook.ipynb');
                        if (fs.existsSync(r1Path) && !fs.existsSync(r2Path)) {
                        fs.copyFileSync(r1Path, r2Path);
                        execFileSync('git', ['add', r2Path]);
                        execFileSync('git', ['add', metaPath]);
                        execFileSync('git', ['commit', '-m',
                            `Review copy: r2_notebook created for @${commenter} (refs #${issue.number})`
                         ]);
                          execFileSync('git', ['push']);
                        }
                    }
                 }
              }
                
                
                
                const itemSummary = isFolderItem
                  ? `This issue is linked to the review folder \`${activePath}\`.`
                  : isFileItem
                    ? `This issue is linked to the standalone review file \`${activePath}\`.`
                    : `This issue is linked to \`${activePath}\`.`;
                
                await reply(`@${commenter} checked out for **second review**. The tracked item was moved to \`reviews/in-progress/\` and the issue is now \`review-2-active\`. ${itemSummary} ${reviewerLine} When done, comment \`/approve\` to move it to completed, or \`/release\` to return it to \`awaiting-review-2\`.`);
                return;
              }
              
              
              await reply(`This item is not currently checkable-out (state: \`${labels.join(', ')}\`).`);
              return;
            }

            // ---------- /release ----------
            if (cmd === '/release') {
              if (!labels.includes('review-2-active')) {
                await reply(`\`/release\` is only valid during an active review (current: \`${labels.join(', ')}\`).`);
                return;
              }
              const assignees = (issue.assignees || []).map(a => a.login);
              if (!assignees.includes(commenter)) {
                await reply(`@${commenter} you're not the current reviewer on this item.`);
                return;
              }
              await github.rest.issues.removeAssignees({
                ...context.repo, issue_number: issue.number, assignees: [commenter],
              });
              if (trackedPath && hasTrackedPath) {
                try {
                  await moveTrackedItemToStage(trackedPath, 'awaiting-review-2');
                } catch (err) {
                  await reply(`Could not move the tracked item back to \`reviews/awaiting-review-2/\`: ${err.message}`);
                  return;
                }
              }
              await setLabels(['awaiting-review-2'], ['review-2-active']);
              await reply(`Released by @${commenter}. The item is back in \`awaiting-review-2\`.`);
              return;
            }

            // ---------- /approve ----------
            if (cmd === '/approve') {
              if (!labels.includes('review-2-active')) {
                await reply(`\`/approve\` is only valid during second review (current: \`${labels.join(', ')}\`).`);
                return;
              }
              const assignees = (issue.assignees || []).map(a => a.login);
              if (!assignees.includes(commenter)) {
                await reply(`@${commenter} only the assigned second reviewer can approve.`);
                return;
              }
              if (reviewer1 && reviewer1 === commenter) {
                await reply(`@${commenter} integrity check failed: you are recorded as the first reviewer.`);
                return;
              }
              await setLabels(['complete'], ['review-2-active']);
              await reply(`Approved by @${commenter}. The review is now marked complete. If this issue is linked to a tracked review folder or file and maintainer email settings are configured, the completion workflow will attempt finalization.`);
              // notify-on-complete.yml takes over from here on the 'complete' label.
              return;
            }
