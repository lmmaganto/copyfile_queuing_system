name: Manage Queue (slash commands)

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  handle-command:
    if: github.event.issue.state == 'open' && (startsWith(github.event.comment.body, '/checkout') || startsWith(github.event.comment.body, '/release') || startsWith(github.event.comment.body, '/approve') || startsWith(github.event.comment.body, '/complete') || startsWith(github.event.comment.body, '/dispute'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Verify commenter is an authorized reviewer
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                username: commenter,
              });
            } catch (e) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number,
                body: '@' + commenter + ' sorry - only authorized reviewers can run slash commands here.',
              });
              core.setFailed('unauthorized');
              return;
            }
            core.setOutput('user', commenter);

      - name: Dispatch command
        if: success()
        uses: actions/github-script@v7
        env:
          COMMENTER: ${{ steps.auth.outputs.user }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const commenter = process.env.COMMENTER;
            const body = context.payload.comment.body.trim();
            const cmd  = body.split(/\s+/)[0];
            const reason = body.replace(cmd, '').trim();
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            const reply = (msg) => github.rest.issues.createComment({
              ...context.repo, issue_number: issue.number, body: msg,
            });

            const setLabels = async (toAdd, toRemove) => {
              for (const l of toRemove) {
                try { await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: issue.number, name: l,
                }); } catch (_) {}
              }
              if (toAdd.length) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number, labels: toAdd,
                });
              }
            };

            const updateIssuePathMarkers = async (oldPath, newPath) => {
              let newBody = issue.body || '';
              if ((issue.body || '').match(/<!--\s*folder:\s*(.+?)\s*-->/)) {
                newBody = newBody.replace(/<!--\s*folder:\s*.+?\s*-->/, '<!-- folder: ' + newPath + ' -->');
              }
              if ((issue.body || '').match(/<!--\s*path:\s*(.+?)\s*-->/)) {
                newBody = newBody.replace(/<!--\s*path:\s*.+?\s*-->/, '<!-- path: ' + newPath + ' -->');
              }
              if (newBody !== (issue.body || '')) {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: issue.number,
                  body: newBody,
                });
              }
            };

            const gitConfig = () => {
              execFileSync('git', ['config', 'user.name', 'github-actions[bot]']);
              execFileSync('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
            };

            const moveTrackedItemToStage = async (sourcePath, stageDir) => {
              const itemName = path.basename(sourcePath);
              const destPath = 'reviews/' + stageDir + '/' + itemName;
              if (sourcePath === destPath) return { moved: false, path: sourcePath };
              if (!sourcePath.startsWith('reviews/')) {
                throw new Error('Tracked path is outside reviews/: ' + sourcePath);
              }
              if (fs.existsSync(destPath)) {
                throw new Error('Destination already exists: ' + destPath);
              }
              fs.mkdirSync('reviews/' + stageDir, { recursive: true });
              gitConfig();
              execFileSync('git', ['mv', sourcePath, destPath]);
              execFileSync('git', ['add', '-A']);
              const pending = execFileSync('git', ['status', '--short']).toString().trim();
              if (pending) {
                execFileSync('git', ['commit', '-m', 'Queue move: ' + itemName + ' -> reviews/' + stageDir + ' (refs #' + issue.number + ')']);
                execFileSync('git', ['push']);
              }
              await updateIssuePathMarkers(sourcePath, destPath);
              return { moved: true, path: destPath };
            };

            const resolveCurator = (trackedPath) => {
              try {
                const teamFile = fs.readFileSync('team_members.yml', 'utf8');
                const members = {};
                const lines = teamFile.split('\n');
                let inMembers = false;
                for (const line of lines) {
                  if (line.trim() === 'members:') { inMembers = true; continue; }
                  if (inMembers && line.includes(':')) {
                    const match = line.match(/"([^"]+)":\s*"([^"]+)"/);
                    if (match) members[match[1]] = match[2];
                  }
                }
                const metaPath = path.join(trackedPath, 'review_metadata.yml');
                if (fs.existsSync(metaPath)) {
                  const meta = fs.readFileSync(metaPath, 'utf8');
                  const curatorMatch = meta.match(/^curator:\s*(.+?)\s*$/m);
                  if (curatorMatch) {
                    const name = curatorMatch[1].trim();
                    return members[name] || name;
                  }
                }
              } catch (e) {
                console.log('Could not resolve curator:', e.message);
              }
              return null;
            };

            const folderMatch = (issue.body || '').match(/<!--\s*folder:\s*(.+?)\s*-->/);
            const folder = folderMatch ? folderMatch[1] : null;
            const pathMatch = (issue.body || '').match(/<!--\s*path:\s*(.+?)\s*-->/);
            const trackedPath = folder || (pathMatch ? pathMatch[1] : null);
            const hasTrackedPath = !!trackedPath && fs.existsSync(trackedPath);
            const trackedStat = hasTrackedPath ? fs.statSync(trackedPath) : null;
            const isFolderItem = !!trackedStat && trackedStat.isDirectory();
            const isFileItem = !!trackedStat && trackedStat.isFile();

            let reviewer1 = null;
            if (folder && fs.existsSync(path.join(folder, 'metadata.yml'))) {
              const yml = fs.readFileSync(path.join(folder, 'metadata.yml'), 'utf8');
              const m = yml.match(/^reviewer_1:\s*(.+?)\s*$/m);
              if (m && m[1] && m[1] !== 'null') reviewer1 = m[1];
            }

            const reviewerLine = reviewer1
              ? 'The recorded first reviewer is @' + reviewer1 + '.'
              : 'No first reviewer is recorded for this item, so the workflow cannot enforce reviewer separation automatically.';

            // ---------- /checkout ----------
            if (cmd === '/checkout') {
              if (labels.includes('awaiting-review-2')) {
                if (!trackedPath) {
                  await reply('Could not determine which repository item this issue tracks (missing `<!-- folder: ... -->` or `<!-- path: ... -->` marker). Aborting checkout - contact the maintainer.');
                  return;
                }
                if (!hasTrackedPath) {
                  await reply('The tracked item for this issue was not found at `' + trackedPath + '`. Aborting checkout - contact the maintainer.');
                  return;
                }
                if (reviewer1 && reviewer1 === commenter) {
                  await reply('@' + commenter + ' you were the **first reviewer** for this item - a different reviewer must perform the second review.');
                  return;
                }
                await github.rest.issues.addAssignees({
                  ...context.repo, issue_number: issue.number, assignees: [commenter],
                });
                let activePath = trackedPath;
                try {
                  const moved = await moveTrackedItemToStage(trackedPath, 'in-progress');
                  activePath = moved.path;
                } catch (err) {
                  await reply('Could not move the tracked item into `reviews/in-progress/`: ' + err.message);
                  return;
                }

                if (isFolderItem) {
                  const metaPath = fs.existsSync(path.join(activePath, 'metadata.yml'))
                    ? path.join(activePath, 'metadata.yml')
                    : path.join(activePath, 'review_metadata.yml');
                  if (fs.existsSync(metaPath)) {
                    const meta = fs.readFileSync(metaPath, 'utf8');
                    const notebookMatch = meta.match(/^(?:notebook|original_notebook):\s*(.+?)\s*$/m);
                    const notebookName = notebookMatch ? notebookMatch[1] : null;
                    const updatedMeta = meta.replace(/^reviewer_2:\s*.*$/m, 'reviewer_2: ' + commenter);
                    fs.writeFileSync(metaPath, updatedMeta);
                    if (notebookName) {
                      const r1Path = path.join(activePath, notebookName);
                      const r2Path = path.join(activePath, 'r2_notebook.ipynb');
                      if (fs.existsSync(r1Path) && !fs.existsSync(r2Path)) {
                        fs.copyFileSync(r1Path, r2Path);
                        gitConfig();
                        execFileSync('git', ['add', r2Path]);
                        execFileSync('git', ['add', metaPath]);
                        execFileSync('git', ['commit', '-m', 'Review copy: r2_notebook created for @' + commenter + ' (refs #' + issue.number + ')']);
                        execFileSync('git', ['push']);
                      }
                    }
                  }
                }

                if (isFileItem && activePath.endsWith('.ipynb')) {
                  const notebookName = path.basename(activePath);
                  const folderName = notebookName.replace('.ipynb', '');
                  const folderPath = path.join(path.dirname(activePath), folderName);
                  fs.mkdirSync(path.join(folderPath, 'original'), { recursive: true });
                  fs.mkdirSync(path.join(folderPath, 'review-copy'), { recursive: true });
                  fs.mkdirSync(path.join(folderPath, 'notes'), { recursive: true });
                  fs.copyFileSync(activePath, path.join(folderPath, 'original', notebookName));
                  const reviewName = notebookName.replace('.ipynb', '_rvd.ipynb');
                  fs.copyFileSync(activePath, path.join(folderPath, 'review-copy', reviewName));
                  let curatorName = 'unknown';
                  try {
                    const nb = JSON.parse(fs.readFileSync(activePath, 'utf8'));
                    const firstCell = nb.cells.find(c => c.cell_type === 'markdown');
                    if (firstCell) {
                      const src = firstCell.source.join('');
                      const m = src.match(/Curator:\s*(.+)/);
                      if (m) curatorName = m[1].trim();
                    }
                  } catch (e) {
                    console.log('Could not read curator from notebook:', e.message);
                  }
                  const metadata = 'paper_id: "' + folderName + '"\nstatus: "in-progress"\ncurator: "' + curatorName + '"\nreviewer: "' + commenter + '"\ncheckout_timestamp: "' + new Date().toISOString() + '"\noriginal_notebook: "' + notebookName + '"\nreview_copy_notebook: "' + reviewName + '"\napproval_timestamp: null\napproved_by: null\n';
                  fs.writeFileSync(path.join(folderPath, 'review_metadata.yml'), metadata);
                  fs.unlinkSync(activePath);
                  gitConfig();
                  execFileSync('git', ['add', folderPath]);
                  execFileSync('git', ['rm', '--cached', activePath]);
                  execFileSync('git', ['commit', '-m', 'Convert: ' + notebookName + ' to folder for @' + commenter + ' (refs #' + issue.number + ')']);
                  execFileSync('git', ['push']);
                  await updateIssuePathMarkers(activePath, folderPath);
                  await reply('@' + commenter + ' the loose notebook has been converted to a review folder at `' + folderPath + '`.\n\nYour copy is at `' + folderPath + '/review-copy/' + reviewName + '`. Open this file - do not edit the original. Add `#SOURCE: p.X` where you found each value, and `#CHANGED: reason` above anything you change. When done, comment `/approve` to complete the review.');
                  await setLabels(['review-2-active'], ['awaiting-review-2', 'complete']);
                  return;
                }

                await setLabels(['review-2-active'], ['awaiting-review-2', 'complete']);
                const itemSummary = isFolderItem
                  ? 'This issue is linked to the review folder `' + activePath + '`.'
                  : isFileItem
                    ? 'This issue is linked to the standalone review file `' + activePath + '`.'
                    : 'This issue is linked to `' + activePath + '`.';
                const notebookMsg = isFolderItem
                  ? '\n\nYour copy is ready at `' + activePath + '/r2_notebook.ipynb`. Open this file - do not edit the original. Add `#SOURCE: p.X` where you found each value, and `#CHANGED: reason` above anything you change.'
                  : '';
                await reply('@' + commenter + ' checked out for **second review**. The tracked item was moved to `reviews/in-progress/` and the issue is now `review-2-active`. ' + itemSummary + ' ' + reviewerLine + notebookMsg + ' When done, comment `/approve` to move it to completed, or `/release` to return it to `awaiting-review-2`.');
                return;
              }
              await reply('This item is not currently checkable-out (state: `' + labels.join(', ') + '`).');
              return;
            }

            // ---------- /release ----------
            if (cmd === '/release') {
              if (!labels.includes('review-2-active')) {
                await reply('`/release` is only valid during an active review (current: `' + labels.join(', ') + '`).');
                return;
              }
              const assignees = (issue.assignees || []).map(a => a.login);
              if (!assignees.includes(commenter)) {
                await reply('@' + commenter + ' you are not the current reviewer on this item.');
                return;
              }
              await github.rest.issues.removeAssignees({
                ...context.repo, issue_number: issue.number, assignees: [commenter],
              });
              if (trackedPath && hasTrackedPath) {
                try {
                  await moveTrackedItemToStage(trackedPath, 'awaiting-review-2');
                } catch (err) {
                  await reply('Could not move the tracked item back to `reviews/awaiting-review-2/`: ' + err.message);
                  return;
                }
              }
              await setLabels(['awaiting-review-2'], ['review-2-active']);
              await reply('Released by @' + commenter + '. The item is back in `awaiting-review-2`.');
              return;
            }

            // ---------- /approve ----------
            if (cmd === '/approve') {
              if (!labels.includes('review-2-active') && !labels.includes('disputed')) {
                await reply('`/approve` is only valid during an active or disputed review (current: `' + labels.join(', ') + '`).');
                return;
              }
              const assignees = (issue.assignees || []).map(a => a.login);
              if (!assignees.includes(commenter)) {
                await reply('@' + commenter + ' only the assigned second reviewer can approve.');
                return;
              }
              if (reviewer1 && reviewer1 === commenter) {
                await reply('@' + commenter + ' integrity check failed: you are recorded as the first reviewer.');
                return;
              }

              let diffSummary = '';
              let curatorGithub = null;
              if (isFolderItem && trackedPath) {
                const metaPath = path.join(trackedPath, 'review_metadata.yml');
                if (fs.existsSync(metaPath)) {
                  try {
                    let meta = fs.readFileSync(metaPath, 'utf8');
                    meta = meta.replace(/^approval_timestamp:.*$/m, 'approval_timestamp: "' + new Date().toISOString() + '"');
                    meta = meta.replace(/^approved_by:.*$/m, 'approved_by: "' + commenter + '"');
                    fs.writeFileSync(metaPath, meta);
                    const result = execFileSync('python', [
                      'scripts/generate_diff_report.py',
                      trackedPath
                    ]).toString().trim();
                    console.log('Diff result:', result);
                    const curatorMatch = result.match(/curator_github:(.+)/);
                    if (curatorMatch) curatorGithub = curatorMatch[1].trim();
                    const reportPath = path.join(trackedPath, 'DIFF_REPORT.md');
                    if (fs.existsSync(reportPath)) {
                      const report = fs.readFileSync(reportPath, 'utf8');
                      const notifMatch = report.match(/## Curator notification\n([\s\S]*?)$/);
                      if (notifMatch) diffSummary = notifMatch[1].trim();
                    }
                    gitConfig();
                    execFileSync('git', ['add', trackedPath]);
                    execFileSync('git', ['commit', '-m', 'Diff report: ' + path.basename(trackedPath) + ' (refs #' + issue.number + ')']);
                    execFileSync('git', ['push']);
                  } catch (err) {
                    console.log('Diff report error:', err.message);
                    diffSummary = 'Diff report could not be generated - run manually with `python scripts/generate_diff_report.py ' + trackedPath + '`';
                  }
                }
              }

              await setLabels(['curator-review'], ['review-2-active', 'disputed']);
              const approvalMsg = diffSummary
                ? '@' + commenter + ' submitted their review.\n\n---\n\n' + diffSummary + '\n\nFull report: `' + trackedPath + '/DIFF_REPORT.md`'
                : '@' + commenter + ' submitted their review. No diff report generated.';
              await reply(approvalMsg);
              return;
            }

            // ---------- /dispute ----------
            if (cmd === '/dispute') {
              if (!labels.includes('curator-review')) {
                await reply('`/dispute` is only valid after a reviewer has submitted their review (current: `' + labels.join(', ') + '`).');
                return;
              }

              // Verify commenter is the curator
              let curatorGithub = null;
              if (isFolderItem && trackedPath) {
                curatorGithub = resolveCurator(trackedPath);
              }
              if (curatorGithub && commenter !== curatorGithub) {
                await reply('@' + commenter + ' only the curator (@' + curatorGithub + ') can dispute this review.');
                return;
              }

              if (!reason) {
                await reply('Please provide a reason for your dispute. Usage: `/dispute your reason here`');
                return;
              }

              // Create or append to curator_notes.md
              if (isFolderItem && trackedPath) {
                const notesPath = path.join(trackedPath, 'curator_notes.md');
                const now = new Date().toISOString();
                const noteEntry = '\n## Dispute — ' + now + '\n**Curator:** @' + commenter + '\n**Reason:** ' + reason + '\n\n---\n';
                if (fs.existsSync(notesPath)) {
                  fs.appendFileSync(notesPath, noteEntry);
                } else {
                  const header = '# Curator notes\n\nThis file records curator disputes during the review process.\n\n---\n';
                  fs.writeFileSync(notesPath, header + noteEntry);
                }
                gitConfig();
                execFileSync('git', ['add', notesPath]);
                execFileSync('git', ['commit', '-m', 'Dispute: curator notes updated (refs #' + issue.number + ')']);
                execFileSync('git', ['push']);
              }

              // Find the reviewer to notify
              let reviewerGithub = null;
              if (isFolderItem && trackedPath) {
                const metaPath = path.join(trackedPath, 'review_metadata.yml');
                if (fs.existsSync(metaPath)) {
                  const meta = fs.readFileSync(metaPath, 'utf8');
                  const m = meta.match(/^reviewer:\s*(.+?)\s*$/m);
                  if (m) reviewerGithub = m[1].trim();
                }
              }

              await setLabels(['disputed'], ['curator-review']);
              const disputeMsg = '**Dispute raised by @' + commenter + '**\n\n**Reason:** ' + reason + '\n\nThis has been recorded in `' + trackedPath + '/curator_notes.md`.\n\n' +
                (reviewerGithub ? '@' + reviewerGithub + ' please review the curator\'s notes, update your notebook, and comment `/approve` again to regenerate the diff report.' : 'Reviewer please check the curator notes, update your notebook, and comment `/approve` again.');
              await reply(disputeMsg);
              return;
            }

            // ---------- /complete ----------
            if (cmd === '/complete') {
              if (!labels.includes('curator-review')) {
                await reply('`/complete` is only valid after a reviewer has submitted their review (current: `' + labels.join(', ') + '`).');
                return;
              }

              let curatorGithub = null;
              if (isFolderItem && trackedPath) {
                curatorGithub = resolveCurator(trackedPath);
              }
              if (curatorGithub && commenter !== curatorGithub) {
                await reply('@' + commenter + ' only the curator (@' + curatorGithub + ') can mark this complete.');
                return;
              }

              let completedPath = trackedPath;
              if (trackedPath && hasTrackedPath) {
                try {
                  const moved = await moveTrackedItemToStage(trackedPath, 'completed');
                  completedPath = moved.path;
                } catch (err) {
                  await reply('Could not move to completed: ' + err.message);
                  return;
                }
              }

              if (completedPath && fs.statSync(completedPath).isDirectory()) {
                const metaPath = path.join(completedPath, 'review_metadata.yml');
                if (fs.existsSync(metaPath)) {
                  let meta = fs.readFileSync(metaPath, 'utf8');
                  meta = meta.replace(/^status:.*$/m, 'status: "completed"');
                  fs.writeFileSync(metaPath, meta);
                  gitConfig();
                  execFileSync('git', ['add', metaPath]);
                  execFileSync('git', ['commit', '-m', 'Complete: ' + path.basename(completedPath) + ' approved by @' + commenter + ' (refs #' + issue.number + ')']);
                  execFileSync('git', ['push']);
                }
              }

              await setLabels(['complete'], ['curator-review', 'disputed']);
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              await reply('Completed by @' + commenter + '. The review is finalized and moved to `reviews/completed/`. Issue closed.');
              return;
            }