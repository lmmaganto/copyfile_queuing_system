name: Bootstrap Seed Issues

# One-time (or repeatable) workflow to create issues for review folders that
# don't yet have a tracking issue. Run from the Actions tab via "Run workflow".

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues for unseeded review folders
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const stages = [
              { dir: 'reviews/awaiting-review-2', label: 'awaiting-review-2' },
              { dir: 'reviews/in-progress',      label: 'review-1-active' },
            ];

            // Pull all open issues once so we can dedupe by folder marker
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo, state: 'all', per_page: 100,
            });
            const seeded = new Set(
              existing
                .map(i => (i.body || '').match(/<!--\s*folder:\s*(.+?)\s*-->/))
                .filter(Boolean)
                .map(m => m[1])
            );

            for (const { dir, label } of stages) {
              if (!fs.existsSync(dir)) continue;
              for (const name of fs.readdirSync(dir)) {
                const folder = `${dir}/${name}`;
                if (!fs.statSync(folder).isDirectory()) continue;
                if (seeded.has(folder)) {
                  core.info(`already seeded: ${folder}`);
                  continue;
                }

                // Read DOI/URL from metadata.yml if present
                let doi = '(unknown)';
                let reviewer1 = '(unknown)';
                const metaPath = `${folder}/metadata.yml`;
                if (fs.existsSync(metaPath)) {
                  const yml = fs.readFileSync(metaPath, 'utf8');
                  doi = (yml.match(/^doi:\s*(.+)$/m) || [])[1] || doi;
                  reviewer1 = (yml.match(/^reviewer_1:\s*(.+)$/m) || [])[1] || reviewer1;
                }

                const body = [
                  `**Manuscript:** ${name}`,
                  `**DOI:** ${doi}`,
                  `**First reviewer:** @${reviewer1}`,
                  '**Folder:** `' + folder + '`',
                  '',
                  'This item was seeded into the queue from existing files.',
                  '',
                  `A second reviewer (anyone except @${reviewer1}) can claim it by commenting \`/checkout\` below.`,
                  '',
                  `<!-- folder: ${folder} -->`,
                ].join('\n');

                const created = await github.rest.issues.create({
                  ...context.repo,
                  title: `[REVIEW] ${name}`,
                  body,
                  labels: [label],
                });
                core.info(`created issue #${created.data.number} for ${folder}`);
              }
            }
