name: Void Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  close:
    if: github.event.label.name == 'void'
    runs-on: ubuntu-latest
    steps:
      - name: Close and comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: 'Closed as void (duplicate, stale, or admin action). No files were moved and no notifications were sent.',
            });
            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
